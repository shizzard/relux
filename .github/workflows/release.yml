name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('crates/**', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release -p relux --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../relux-${{ github.ref_name }}-${{ matrix.target }}.tar.gz relux
          cd ../../..

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: relux-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  vscode-plugin:
    name: VSCode Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Package VSCode extension
        working-directory: editors/vscode
        run: |
          npm install -g @vscode/vsce
          vsce package --out ../../relux-vscode-${{ github.ref_name }}.vsix

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: relux-vscode-${{ github.ref_name }}.vsix

  publish:
    name: Publish to crates.io
    needs: [build]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Publish all workspace crates in dependency order.
      # --no-verify: build job already validated compilation.
      # sleep 30: give crates.io index time to propagate between publishes.
      # || echo: allow re-runs when some crates are already published.
      - name: Publish
        run: |
          for crate in relux-core relux-ast relux-lexer relux-ir relux-parser relux-runtime relux-resolver relux; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --no-verify || echo "Skipping $crate (already published or error)"
            if [ "$crate" != "relux" ]; then
              sleep 30
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  intellij-plugin:
    name: IntelliJ Plugin
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build IntelliJ plugin
        working-directory: editors/intellij
        run: |
          gradle buildPlugin --info
          cp build/distributions/*.zip ../../relux-intellij-${{ github.ref_name }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: relux-intellij-${{ github.ref_name }}.zip

      - name: Check for plugin changes
        id: plugin-changes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --quiet "$PREV_TAG" HEAD -- editors/intellij/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to JetBrains Marketplace
        if: steps.plugin-changes.outputs.changed == 'true'
        working-directory: editors/intellij
        run: gradle publishPlugin
        env:
          JETBRAINS_PLUGIN_RELEASE_TOKEN: ${{ secrets.JETBRAINS_PLUGIN_RELEASE_TOKEN }}
