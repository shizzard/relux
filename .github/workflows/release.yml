name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('crates/**', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}-
            ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release -p relux --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../relux-${{ github.ref_name }}-${{ matrix.target }}.tar.gz relux
          cd ../../..

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: relux-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  vscode-plugin:
    name: VSCode Plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Package VSCode extension
        working-directory: editors/vscode
        run: |
          npm install -g @vscode/vsce
          vsce package --out ../../relux-vscode-${{ github.ref_name }}.vsix

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: relux-vscode-${{ github.ref_name }}.vsix

  publish:
    name: Publish to crates.io
    needs: [build]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      # Publish all workspace crates in dependency order.
      # --no-verify: build job already validated compilation.
      # Retries with backoff handle crates.io rate limits for new crates.
      - name: Publish
        run: |
          publish_crate() {
            local crate=$1
            for attempt in 1 2 3; do
              echo "Publishing $crate (attempt $attempt)..."
              output=$(cargo publish -p "$crate" --no-verify 2>&1) && return 0
              if echo "$output" | grep -q -e "already uploaded" -e "already exists"; then
                echo "$crate already published, skipping."
                return 0
              fi
              echo "$output"
              if [ "$attempt" -lt 3 ]; then
                echo "Retrying in 120s..."
                sleep 120
              fi
            done
            echo "::error::Failed to publish $crate after 3 attempts"
            return 1
          }

          for crate in relux-core relux-ast relux-lexer relux-ir relux-parser relux-runtime relux-resolver relux; do
            publish_crate "$crate"
            if [ "$crate" != "relux" ]; then
              sleep 60
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  intellij-plugin:
    name: IntelliJ Plugin
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build IntelliJ plugin
        working-directory: editors/intellij
        run: |
          gradle buildPlugin --info
          cp build/distributions/*.zip ../../relux-intellij-${{ github.ref_name }}.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: relux-intellij-${{ github.ref_name }}.zip

      - name: Publish to JetBrains Marketplace
        working-directory: editors/intellij
        run: |
          output=$(gradle publishPlugin 2>&1) && exit 0
          if echo "$output" | grep -q "already contains version"; then
            echo "Plugin version already published, skipping."
          else
            echo "$output"
            exit 1
          fi
        env:
          JETBRAINS_PLUGIN_RELEASE_TOKEN: ${{ secrets.JETBRAINS_PLUGIN_RELEASE_TOKEN }}
