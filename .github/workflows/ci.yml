name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo +stable clippy --all-targets -- -D warnings

      - name: Format check
        run: rustup run nightly rustfmt --edition 2024 --check $(find src -name '*.rs') bin/relux.rs

      - name: Unit tests
        run: cargo +stable test --lib

  e2e:
    name: E2E (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: E2E tests
        run: |
          cargo run -- check --manifest tests/Relux.toml
          cargo run -- run --manifest tests/Relux.toml

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ matrix.os }}
          path: tests/relux/out/
          retention-days: 7
